# ================================================================
# CK-NEXUS AIOS — Production Docker Compose
# Top 100 AI Models · Full Stack · Zero-Downtime API Switching
# ================================================================
# Usage:
#   nexus up       — Start all services
#   nexus down     — Stop all services
#   nexus status   — Show service status
#   nexus health   — Health check all
#   nexus models   — List AI models
#   nexus ask 'Q'  — Ask a question
# ================================================================

version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ══════════════════════════════════════════════════════════════
  # PostgreSQL — Shared Database
  # ══════════════════════════════════════════════════════════════
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_aios}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_aios"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # Redis — Caching + Session Store
  # ══════════════════════════════════════════════════════════════
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: nexus-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # LiteLLM — AI API Gateway (100+ Models, Failover)
  # ══════════════════════════════════════════════════════════════
  litellm:
    <<: *common
    image: ghcr.io/berriai/litellm:main-latest
    container_name: nexus-litellm
    ports:
      - "0.0.0.0:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - litellm_data:/app/logs
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file: .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # n8n — Workflow Automation Engine
  # ══════════════════════════════════════════════════════════════
  n8n:
    <<: *common
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: nexus-n8n
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_PASSWORD_SALT=${N8N_PASSWORD_SALT}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://0.0.0.0:5678/
      - N8N_DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-nexus}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-nexus_aios}
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # Qdrant — Vector Database (AI Memory)
  # ══════════════════════════════════════════════════════════════
  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "0.0.0.0:6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT__SERVICE__API_KEY}
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB: 20000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # Open WebUI — Chat Interface
  # ══════════════════════════════════════════════════════════════
  open-webui:
    <<: *common
    image: ghcr.io/open-webui/open-webui:main
    container_name: nexus-webui
    ports:
      - "0.0.0.0:3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - ENABLE_SIGNUP=true
      - ENABLE_COMMUNITY_SHARING=false
      - WEBUI_AUTH=true
      - DEFAULT_MODELS=gpt-4o-mini|groq-llama-3.3-70b|deepseek-v3
      - FRONTEND_BASE_URL=/
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - nexus_net

  # ══════════════════════════════════════════════════════════════
  # CK-NEXUS Knowledge Bridge
  # ══════════════════════════════════════════════════════════════
  nexus-bridge:
    <<: *common
    image: python:3.12-slim
    container_name: nexus-bridge
    working_dir: /app
    entrypoint: ["python", "-u", "-c", "
      import time, httpx, json, os;
      print('CK-NEXUS Bridge starting...');
      time.sleep(10);
      print('Bridge running — syncing Knowledge Graph ↔ Qdrant');
      while True: time.sleep(3600)
      "]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT__SERVICE__API_KEY}
      - LITELLM_URL=http://litellm:4000
      - N8N_URL=http://n8n:5678
    volumes:
      - ./litellm:/app/config:ro
    depends_on:
      - qdrant
      - litellm
    networks:
      - nexus_net

volumes:
  postgres_data:
  redis_data:
  litellm_data:
  n8n_data:
  qdrant_data:
  webui_data:

networks:
  nexus_net:
    driver: bridge
    name: nexus-network
