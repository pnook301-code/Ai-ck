    num_retries: 3

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  completion_model: gpt-4o-mini

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 3
  fallbacks:
    - gpt-5.5-sol: [claude-opus-4, gemini-2.5-pro, deepseek-v3]
    - gpt-4o: [claude-sonnet-4, gemini-2.5-flash, deepseek-v3]
    - gpt-4o-mini: [groq-llama-3.3-70b, deepseek-v3, together-llama-3.3-70b]
    - claude-opus-4: [gpt-5.5-sol, gemini-2.5-pro, deepseek-v3]
    - gemini-2.5-pro: [gpt-5.5-sol, claude-opus-4, deepseek-v3]
    - deepseek-v3: [groq-llama-3.3-70b, together-llama-3.3-70b, free-llama-3.3-70b]
    - deepseek-r1: [o3-mini, groq-deepseek-r1, free-llama-3.3-70b]
    - free-llama-3.3-70b: [groq-llama-3.3-70b, free-llama-3.1-8b, free-gemma2-9b]
